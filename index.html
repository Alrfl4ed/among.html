<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Among Us Clone</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #111; font-family: sans-serif; user-select: none; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .interactive { pointer-events: auto; }
        
        #menu-screen { position: absolute; width: 100%; height: 100%; background: #222; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .menu-panel { background: #333; padding: 20px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; min-width: 280px; }
        input, select, button { padding: 10px; font-size: 16px; border-radius: 5px; border: none; }
        button { background: #861919; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #a82323; }

        #lobby-ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; color: white; width: 250px; display: none; }
        #player-list { list-style: none; padding: 0; margin: 10px 0; }
        #player-list li { margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        
        #chat-box { background: rgba(0,0,0,0.5); height: 120px; overflow-y: auto; padding: 5px; margin-bottom: 5px; border-radius: 4px; font-size: 14px; }
        #chat-input { width: calc(100% - 22px); padding: 5px; font-size: 14px; }

        #host-settings { margin-top: 10px; border-top: 1px solid #555; padding-top: 10px; display: none; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .setting-row input { width: 60px; padding: 3px; font-size: 14px; }

        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; touch-action: none; }
        #joystick-handle { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; top: 35px; left: 35px; }

        #action-btn { position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px; background: rgba(134,25,25,0.8); border: 3px solid white; border-radius: 50%; color: white; font-weight: bold; font-size: 16px; display: none; justify-content: center; align-items: center; }

        #lights-task-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 4px solid #444; border-radius: 10px; padding: 30px; display: none; flex-direction: column; align-items: center; gap: 20px; color: white; z-index: 200; }
        .bulbs-container { display: flex; gap: 30px; }
        .bulb-socket { width: 60px; height: 100px; background: #333; border: 2px dashed #666; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 10px; box-sizing: border-box; }
        .bulb { width: 40px; height: 40px; border-radius: 50%; background: #555; cursor: pointer; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .bulb.placed { background: #ffe600; box-shadow: 0 0 20px #ffe600, inset 0 0 5px #fff; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-screen">
        <div class="menu-panel interactive">
            <h2>Game Setup</h2>
            <input type="text" id="username" placeholder="Name">
            <label>Color:</label>
            <input type="color" id="player-color" value="#ff0000">
            <label>Cosmetic:</label>
            <select id="player-cosmetic">
                <option value="none">None</option>
                <option value="hat">Hat</option>
                <option value="goggles">Goggles</option>
                <option value="crown">Crown</option>
            </select>
            <input type="text" id="room-id" placeholder="Lobby ID" value="default-room">
            <button id="join-btn">Enter Lobby</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="lobby-ui" class="interactive">
            <h3 id="lobby-title">Lobby</h3>
            <ul id="player-list"></ul>
            
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Press Enter to chat...">

            <div id="host-settings">
                <div class="setting-row">
                    <label>Crewmate Vis:</label>
                    <input type="number" id="cfg-crew-vis" step="0.1" min="0.2" max="3.0">
                </div>
                <div class="setting-row">
                    <label>Imp vis:</label>
                    <input type="number" id="cfg-imp-vis" step="0.1" min="0.2" max="3.0">
                </div>
                <button id="start-game-btn" style="width:100%; margin-top:5px;">Start Game</button>
            </div>
            <button id="leave-btn" style="width:100%; margin-top:5px; background:#444;">Leave</button>
        </div>

        <div id="joystick-zone" class="interactive">
            <div id="joystick-handle"></div>
        </div>

        <div id="action-btn" class="interactive">VENT</div>

        <div id="lights-task-ui" class="interactive">
            <h3>Fix Lights: Screwin 3 Bulbs</h3>
            <div class="bulbs-container">
                <div class="bulb-socket" data-index="0"><div class="bulb" id="bulb-0"></div></div>
                <div class="bulb-socket" data-index="1"><div class="bulb" id="bulb-1"></div></div>
                <div class="bulb-socket" data-index="2"><div class="bulb" id="bulb-2"></div></div>
            </div>
            <button id="close-task-btn">Close</button>
        </div>
    </div>

    <script>
        const socket = io();
        
        let scene, camera, renderer;
        let players = {};
        let localPlayerId = null;
        let isImposter = false;
        let gameActive = false;
        let lightsBroken = false;
        let lobbySettings = { crewmateVis: 1.0, imposterVis: 1.5 };
        
        let moveDirection = { x: 0, y: 0 };
        let baseSpeed = 0.15;
        let currentVentIndex = -1;
        const vents = [
            { x: -10, y: 0, z: -10 },
            { x: 10, y: 0, z: -10 },
            { x: 0, y: 0, z: 10 }
        ];

        let bulbsPlaced = [false, false, false];

        if (localStorage.getItem('amg_name')) document.getElementById('username').value = localStorage.getItem('amg_name');
        if (localStorage.getItem('amg_color')) document.getElementById('player-color').value = localStorage.getItem('amg_color');
        if (localStorage.getItem('amg_cosmetic')) document.getElementById('player-cosmetic').value = localStorage.getItem('amg_cosmetic');

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const floorGeo = new THREE.PlaneGeometry(60, 60);
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            vents.forEach((v, i) => {
                const ventGeo = new THREE.BoxGeometry(1.5, 0.1, 1.5);
                const ventMat = new THREE.MeshBasicMaterial({ color: 0x555555 });
                const ventMesh = new THREE.Mesh(ventGeo, ventMat);
                ventMesh.position.set(v.x, v.y, v.z);
                scene.add(ventMesh);
            });

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createPlayerMesh(data) {
            const group = new THREE.Group();

            const bodyGeo = new THREE.CapsuleGeometry(0.4, 0.8, 4, 8);
            const bodyMat = new THREE.MeshBasicMaterial({ color: data.color });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6;
            group.add(body);

            const visorGeo = new THREE.BoxGeometry(0.5, 0.25, 0.2);
            const visorMat = new THREE.MeshBasicMaterial({ color: 0x88ccff });
            const visor = new THREE.Mesh(visorGeo, visorMat);
            visor.position.set(0, 0.8, 0.35);
            group.add(visor);

            if (data.cosmetic && data.cosmetic !== 'none') {
                let cosMesh;
                if (data.cosmetic === 'hat') {
                    cosMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.2, 8), new THREE.MeshBasicMaterial({ color: 0x000000 }));
                    cosMesh.position.y = 1.2;
                } else if (data.cosmetic === 'goggles') {
                    cosMesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.15, 0.1), new THREE.MeshBasicMaterial({ color: 0xffffffff }));
                    cosMesh.position.set(0, 0.8, 0.42);
                } else if (data.cosmetic === 'crown') {
                    cosMesh = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.4, 4), new THREE.MeshBasicMaterial({ color: 0xffd700 }));
                    cosMesh.position.y = 1.3;
                }
                if (cosMesh) group.add(cosMesh);
            }

            scene.add(group);
            return group;
        }

        document.getElementById('join-btn').addEventListener('click', () => {
            const name = document.getElementById('username').value || 'Player';
            const color = document.getElementById('player-color').value;
            const cosmetic = document.getElementById('player-cosmetic').value;
            const roomId = document.getElementById('room-id').value || 'default-room';

            localStorage.setItem('amg_name', name);
            localStorage.setItem('amg_color', color);
            localStorage.setItem('amg_cosmetic', cosmetic);

            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('lobby-ui').style.display = 'block';
            
            if (window.innerHeight < 768 || 'ontouchstart' in window) {
                document.getElementById('joystick-zone').style.display = 'block';
            }

            init3D();

            localPlayerId = socket.id;
            socket.emit('joinLobby', { roomId, name, color, cosmetic });
        });

        socket.on('lobbyUpdate', (data) => {
            const pList = document.getElementById('player-list');
            pList.innerHTML = '';
            
            let isLocalHost = false;

            Object.values(players).forEach(p => scene.remove(p.mesh));
            players = {};

            data.players.forEach(p => {
                if (p.id === socket.id) {
                    isLocalHost = p.isHost;
                    isImposter = p.isImposter;
                }

                const li = document.createElement('li');
                li.innerHTML = `<span class="color-dot" style="background:${p.color}"></span> ${p.name} ${p.isHost ? '(Host)' : ''}`;
                pList.appendChild(li);

                p.mesh = createPlayerMesh(p);
                p.mesh.position.set(p.x, 0, p.y);
                players[p.id] = p;
            });

            lobbySettings = data.settings;
            gameActive = data.gameStarted;

            document.getElementById('host-settings').style.display = isLocalHost ? 'block' : 'none';
            document.getElementById('cfg-crew-vis').value = lobbySettings.crewmateVis;
            document.getElementById('cfg-imp-vis').value = lobbySettings.imposterVis;
        });

        socket.on('settingsUpdated', (settings) => {
            lobbySettings = settings;
            document.getElementById('cfg-crew-vis').value = settings.crewmateVis;
            document.getElementById('cfg-imp-vis').value = settings.imposterVis;
        });

        socket.on('playerMoved', (data) => {
            if (players[data.id]) {
                players[data.id].mesh.position.set(data.x, 0, data.y);
                players[data.id].x = data.x;
                players[data.id].y = data.y;
            }
        });

        socket.on('lightsStatus', (data) => {
            lightsBroken = data.broken;
        });

        socket.on('gameEnded', (data) => {
            gameActive = false;
            lightsBroken = false;
            currentVentIndex = -1;
            document.getElementById('action-btn').style.display = 'none';
            document.getElementById('lobby-ui').style.display = 'block';
            bulbsPlaced = [false, false, false];
            document.querySelectorAll('.bulb').forEach(b => b.classList.remove('placed'));
        });

        document.getElementById('cfg-crew-vis').addEventListener('input', updateHostSettings);
        document.getElementById('cfg-imp-vis').addEventListener('input', updateHostSettings);

        function updateHostSettings() {
            socket.emit('updateSettings', {
                crewmateVis: parseFloat(document.getElementById('cfg-crew-vis').value) || 1.0,
                imposterVis: parseFloat(document.getElementById('cfg-imp-vis').value) || 1.5
            });
        }

        document.getElementById('start-game-btn').addEventListener('click', () => {
            socket.emit('updateSettings', {
                crewmateVis: parseFloat(document.getElementById('cfg-crew-vis').value) || 1.0,
                imposterVis: parseFloat(document.getElementById('cfg-imp-vis').value) || 1.5
            });
            socket.emit('lobbyChat', 'System: Game starting standard initialization...');
        });

        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== '') {
                socket.emit('lobbyChat', e.target.value);
                e.target.value = '';
            }
        });

        socket.on('lobbyMessage', (data) => {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div><strong>${data.sender}:</strong> ${data.text}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        document.getElementById('leave-btn').addEventListener('click', () => {
            window.location.reload();
        });

        setupJoystickEvents();

        function setupJoystickEvents() {
            const zone = document.getElementById('joystick-zone');
            const handle = document.getElementById('joystick-handle');
            let activeTouchId = null;

            zone.addEventListener('touchstart', (e) => {
                if (activeTouchId === null) {
                    const touch = e.changedTouches[0];
                    activeTouchId = touch.identifier;
                    handleJoystick(touch);
                }
            }, { passive: true });

            window.addEventListener('touchmove', (e) => {
                if (activeTouchId !== null) {
                    for (let i = 0; i < e.touches.length; i++) {
                        if (e.touches[i].identifier === activeTouchId) {
                            handleJoystick(e.touches[i]);
                        }
                    }
                }
            }, { passive: true });

            window.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === activeTouchId) {
                        activeTouchId = null;
                        moveDirection = { x: 0, y: 0 };
                        handle.style.left = '35px';
                        handle.style.top = '35px';
                    }
                }
            }, { passive: true });

            function handleJoystick(touch) {
                const rect = zone.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const maxRadius = rect.width / 2;

                if (distance > maxRadius) {
                    dx = (dx / distance) * maxRadius;
                    dy = (dy / distance) * maxRadius;
                }

                handle.style.left = `${35 + dx}px`;
                handle.style.top = `${35 + dy}px`;

                moveDirection.x = dx / maxRadius;
                moveDirection.y = dy / maxRadius;
            }
        }

        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        function updateKeyboardMovement() {
            if ('ontouchstart' in window || window.innerHeight < 768) return; 
            
            let x = 0;
            let z = 0;
            if (keys['w'] || keys['arrowup']) z = -1;
            if (keys['s'] || keys['arrowdown']) z = 1;
            if (keys['a'] || keys['arrowleft']) x = -1;
            if (keys['d'] || keys['arrowright']) x = 1;

            if (x !== 0 && z !== 0) {
                x *= 0.7071;
                z *= 0.7071;
            }
            moveDirection.x = x;
            moveDirection.y = z;
        }

        const actionBtn = document.getElementById('action-btn');
        actionBtn.addEventListener('click', handleAction);

        function handleAction() {
            if (!gameActive) return;

            if (isImposter) {
                if (currentVentIndex === -1) {
                    let closeVentIdx = -1;
                    let minDist = 2.5;
                    const lp = players[socket.id];
                    
                    vents.forEach((v, index) => {
                        const dist = Math.hypot(lp.mesh.position.x - v.x, lp.mesh.position.z - v.z);
                        if (dist < minDist) {
                            minDist = dist;
                            closeVentIdx = index;
                        }
                    });

                    if (closeVentIdx !== -1) {
                        currentVentIndex = closeVentIdx;
                        lp.mesh.position.set(vents[currentVentIndex].x, -2, vents[currentVentIndex].z);
                        actionBtn.innerText = "EXIT";
                    }
                } else {
                    const lp = players[socket.id];
                    lp.mesh.position.set(vents[currentVentIndex].x, 0, vents[currentVentIndex].z);
                    currentVentIndex = -1;
                    actionBtn.innerText = "VENT";
                }
                socket.emit('playerMove', { x: players[socket.id].mesh.position.x, y: players[socket.id].mesh.position.z });
            } else {
                if (lightsBroken) {
                    document.getElementById('lights-task-ui').style.display = 'flex';
                }
            }
        }

        document.querySelectorAll('.bulb').forEach(bulb => {
            bulb.addEventListener('click', (e) => {
                const idx = parseInt(e.target.parentNode.dataset.index);
                if (!bulbsPlaced[idx]) {
                    bulbsPlaced[idx] = true;
                    e.target.classList.add('placed');
                    
                    if (bulbsPlaced.every(v => v === true)) {
                        setTimeout(() => {
                            document.getElementById('lights-task-ui').style.display = 'none';
                            socket.emit('fixLights');
                            bulbsPlaced = [false, false, false];
                            document.querySelectorAll('.bulb').forEach(b => b.classList.remove('placed'));
                        }, 300);
                    }
                }
            });
        });

        document.getElementById('close-task-btn').addEventListener('click', () => {
            document.getElementById('lights-task-ui').style.display = 'none';
        });

        function animate() {
            requestAnimationFrame(animate);
            
            if (players[socket.id]) {
                const localPlayer = players[socket.id];

                if (currentVentIndex === -1) {
                    updateKeyboardMovement();
                    
                    let speedModifier = baseSpeed;
                    localPlayer.mesh.position.x += moveDirection.x * speedModifier;
                    localPlayer.mesh.position.z += moveDirection.y * speedModifier;

                    if (moveDirection.x !== 0 || moveDirection.y !== 0) {
                        socket.emit('playerMove', { x: localPlayer.mesh.position.x, y: localPlayer.mesh.position.z });
                    }
                } else {
                    if (keys['a'] || keys['arrowleft']) {
                        currentVentIndex = (currentVentIndex - 1 + vents.length) % vents.length;
                        localPlayer.mesh.position.set(vents[currentVentIndex].x, -2, vents[currentVentIndex].z);
                        socket.emit('playerMove', { x: localPlayer.mesh.position.x, y: localPlayer.mesh.position.z });
                        keys['a'] = keys['arrowleft'] = false;
                    } else if (keys['d'] || keys['arrowright']) {
                        currentVentIndex = (currentVentIndex + 1) % vents.length;
                        localPlayer.mesh.position.set(vents[currentVentIndex].x, -2, vents[currentVentIndex].z);
                        socket.emit('playerMove', { x: localPlayer.mesh.position.x, y: localPlayer.mesh.position.z });
                        keys['d'] = keys['arrowright'] = false;
                    }
                }

                camera.position.set(localPlayer.mesh.position.x, 12, localPlayer.mesh.position.z + 8);
                camera.lookAt(localPlayer.mesh.position);

                if (gameActive) {
                    if (isImposter) {
                        actionBtn.style.display = 'flex';
                        if (currentVentIndex !== -1) {
                            actionBtn.innerText = "EXIT";
                        } else {
                            let closeToVent = false;
                            vents.forEach(v => {
                                if (Math.hypot(localPlayer.mesh.position.x - v.x, localPlayer.mesh.position.z - v.z) < 2.5) {
                                    closeToVent = true;
                                }
                            });
                            actionBtn.innerText = "VENT";
                            actionBtn.style.opacity = closeToVent ? '1.0' : '0.4';
                        }
                    } else {
                        if (lightsBroken && Math.hypot(localPlayer.mesh.position.x, localPlayer.mesh.position.z) < 4) {
                            actionBtn.style.display = 'flex';
                            actionBtn.innerText = "USE";
                            actionBtn.style.opacity = '1.0';
                        } else {
                            actionBtn.style.display = 'none';
                        }
                    }
                }

                Object.values(players).forEach(p => {
                    if (p.id === socket.id) {
                        p.mesh.visible = (currentVentIndex === -1);
                        return;
                    }

                    if (p.mesh.position.y < -1) {
                        p.mesh.visible = false;
                        return;
                    }

                    let distance = Math.hypot(localPlayer.mesh.position.x - p.mesh.position.x, localPlayer.mesh.position.z - p.mesh.position.z);
                    let maxVis = isImposter ? lobbySettings.imposterVis * 10 : lobbySettings.crewmateVis * 10;
                    
                    if (lightsBroken && !isImposter) {
                        maxVis = 2.5; 
                    }

                    p.mesh.visible = (distance <= maxVis);
                });
            }

            if (renderer) renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
