<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Sabotage</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: #fff; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .menu-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #111; }
        .menu-box { background: #222; padding: 20px; border-radius: 8px; width: 300px; text-align: center; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #444; background: #333; color: #fff; font-size: 16px; }
        button { background: #0578ff; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #0062d1; }
        
        #lobby-ui { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; padding: 20px; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        .left-panel { position: absolute; top: 20px; left: 20px; width: 260px; display: flex; flex-direction: column; gap: 10px; }
        .right-panel { position: absolute; top: 20px; right: 20px; width: 300px; display: flex; flex-direction: column; gap: 10px; }
        .info-box { background: rgba(34, 34, 34, 0.9); border: 1px solid #444; border-radius: 6px; padding: 12px; }
        
        .player-entry { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
        .swatch { width: 12px; height: 12px; border-radius: 50%; }
        .host-label { background: #ffca28; color: #000; font-size: 10px; padding: 1px 3px; border-radius: 2px; font-weight: bold; margin-left: auto; }
        
        .chat-area { height: 180px; display: flex; flex-direction: column; background: rgba(20, 20, 20, 0.9); border: 1px solid #444; border-radius: 6px; overflow: hidden; }
        .chat-logs { flex: 1; padding: 8px; overflow-y: auto; font-size: 14px; }
        .chat-input-bar { display: flex; border-top: 1px solid #444; }
        .chat-input-bar input { margin: 0; border: none; border-radius: 0; flex: 1; padding: 6px; }
        .chat-input-bar button { margin: 0; border-radius: 0; width: 50px; padding: 6px; font-size: 14px; }
        
        #joystick-container { position: absolute; bottom: 30px; left: 30px; width: 110px; height: 110px; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; z-index: 8; display: none; touch-action: none; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 40px; height: 40px; background: rgba(255,255,255,0.4); border-radius: 50%; }
        
        .action-btn { position: absolute; bottom: 30px; right: 30px; width: 75px; height: 75px; border-radius: 50%; background: rgba(34, 34, 34, 0.9); border: 2px solid #0578ff; color: #fff; font-weight: bold; font-size: 13px; display: none; justify-content: center; align-items: center; z-index: 8; cursor: pointer; }
        #vent-btn { right: 120px; border-color: #ff3838; }
        #sabotage-menu-btn { bottom: 120px; right: 30px; border-color: #ff9f43; }
        
        .overlay-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
        .panel-box { background: #222; border: 2px solid #444; border-radius: 6px; padding: 20px; width: 280px; text-align: center; }
        .bulbs-line { display: flex; justify-content: space-around; margin: 20px 0; }
        .bulb { width: 35px; height: 35px; border-radius: 50%; background: #3a1010; border: 2px solid #111; }
        .bulb.on { background: #00ff00; box-shadow: 0 0 15px #00ff00; }
        .sw-btn { width: 55px; background: #444; padding: 6px; border-radius: 4px; color: #fff; cursor: pointer; border: 1px solid #555; }
        .sw-btn.active { background: #666; border-color: #00ff00; }
        
        .alert-banner { display: none; position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: #ff3838; color: #fff; padding: 10px 25px; border-radius: 4px; font-weight: bold; animation: pulse 1s infinite; z-index: 6; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        #role-reveal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 30; background: #000; justify-content: center; align-items: center; flex-direction: column; }
        #role-text { font-size: 40px; font-weight: bold; text-transform: uppercase; }
        #role-text.imposter { color: #ff3838; }
        #role-text.crewmate { color: #0578ff; }
        
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; font-size: 13px; }
        .setting-item select { width: 90px; padding: 3px; margin: 0; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="auth-screen" class="menu-screen">
        <div class="menu-box">
            <h2 style="margin-bottom:10px;">Space Sabotage</h2>
            <input type="text" id="username-input" placeholder="Nickname" maxlength="15">
            <select id="color-input">
                <option value="#ff3838">Red</option>
                <option value="#2ed573">Green</option>
                <option value="#0578ff">Blue</option>
                <option value="#ffa502">Orange</option>
                <option value="#eccc68">Yellow</option>
                <option value="#a4b0be">Purple</option>
            </select>
            <select id="cosmetic-input">
                <option value="none">No Cosmetic</option>
                <option value="spacesuit">Classic Suit</option>
                <option value="explorer">Explorer Cap</option>
                <option value="captain">Captain Hat</option>
            </select>
            <button id="find-match-btn">Find Games</button>
            <button id="create-lobby-btn" style="background:#2ed573; margin-top:5px;">Create Game</button>
        </div>
    </div>

    <div id="browser-screen" class="menu-screen" style="display:none;">
        <div class="menu-box" style="width:340px;">
            <h2 style="margin-bottom:10px;">Lobbies</h2>
            <div id="server-list" style="max-height: 200px; overflow-y: auto; text-align: left; margin: 10px 0;"></div>
            <button class="secondary-btn" id="back-auth-btn" style="background:#444;">Back</button>
        </div>
    </div>

    <div id="lobby-ui">
        <div class="left-panel interactive">
            <div class="info-box">
                <h4 style="color:#0578ff; margin-bottom:5px;">Options</h4>
                <div id="host-settings-view">
                    <div class="setting-item">
                        <span>Crewmate Vis:</span>
                        <select id="setting-crew-vis" disabled>
                            <option value="3">3m</option>
                            <option value="6" selected>6m</option>
                            <option value="12">12m</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <span>Imp Vis:</span>
                        <select id="setting-imp-vis" disabled>
                            <option value="8">8m</option>
                            <option value="16" selected>16m</option>
                            <option value="24">24m</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="info-box" style="flex: 1; display: flex; flex-direction: column;">
                <h4 style="margin-bottom:5px;">Players</h4>
                <div id="player-list-container" style="flex:1; overflow-y:auto;"></div>
            </div>
        </div>

        <div class="right-panel interactive">
            <div class="chat-area">
                <div class="chat-logs" id="chat-display"></div>
                <div class="chat-input-bar">
                    <input type="text" id="chat-input-field" placeholder="Chat..." maxlength="60">
                    <button id="chat-send-btn">Send</button>
                </div>
            </div>
            <button id="start-game-btn" style="display:none; background:#2ed573;">Start Game</button>
            <button id="leave-lobby-btn" style="background:#444;">Leave</button>
        </div>
    </div>

    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div id="use-btn" class="action-btn interactive">Use</div>
    <div id="vent-btn" class="action-btn interactive">Vent</div>
    <div id="sabotage-menu-btn" class="action-btn interactive" style="background:#ff3838; border-color:#fff;">Sabotage</div>

    <div id="sabotage-indicator" class="alert-banner">LIGHTS MALFUNCTION (3 BULBS)</div>

    <div id="lights-minigame" class="overlay-screen interactive">
        <div class="panel-box">
            <h3 style="margin-bottom:10px;">Fix Lights</h3>
            <div class="bulbs-line">
                <div>
                    <div class="bulb" id="bulb-0"></div>
                    <button class="sw-btn" id="switch-0" style="margin-top:10px;">OFF</button>
                </div>
                <div>
                    <div class="bulb" id="bulb-1"></div>
                    <button class="sw-btn" id="switch-1" style="margin-top:10px;">OFF</button>
                </div>
                <div>
                    <div class="bulb" id="bulb-2"></div>
                    <button class="sw-btn" id="switch-2" style="margin-top:10px;">OFF</button>
                </div>
            </div>
            <button style="background:#444; margin:0;" onclick="closeMinigame()">Close</button>
        </div>
    </div>

    <div id="role-reveal">
        <div id="role-text">Crewmate</div>
    </div>

    <script>
        const socket = io();

        let myLocalData = { name: 'Player', color: '#ff3838', cosmetic: 'none' };
        
        function loadSavedProfile() {
            const n = sessionStorage.getItem('as_name');
            const c = sessionStorage.getItem('as_color');
            const m = sessionStorage.getItem('as_cosm');
            if(n) { myLocalData.name = n; document.getElementById('username-input').value = n; }
            if(c) { myLocalData.color = c; document.getElementById('color-input').value = c; }
            if(m) { myLocalData.cosmetic = m; document.getElementById('cosmetic-input').value = m; }
        }
        function saveProfile(n, c, m) {
            sessionStorage.setItem('as_name', n);
            sessionStorage.setItem('as_color', c);
            sessionStorage.setItem('as_cosm', m);
        }

        loadSavedProfile();

        let scene, camera, renderer;
        let localPlayerMesh, ambientLight, spotlight;
        let players = {};
        let gameState = 'auth';
        let myRoomId = null;
        let isHost = false;
        let myRole = 'crewmate';
        let isAlive = true;
        let isVenting = false;
        let currentVent = null;
        let lightsSabotaged = false;
        let currentRoomSettings = { crewmateVis: 6, impVis: 16 };

        const vents = [
            { id: 'v1', x: -15, y: 0.1, z: -15 },
            { id: 'v2', x: 15, y: 0.1, z: -15 },
            { id: 'v3', x: 0, y: 0.1, z: 15 }
        ];

        let keys = { w: false, a: false, s: false, d: false };
        let joystickActive = false;
        let joystickStartX = 0, joystickStartY = 0;
        let moveX = 0, moveY = 0;
        let lastPositionEmit = 0;

        function cacheFormInput() {
            const name = document.getElementById('username-input').value.trim() || 'Player';
            const color = document.getElementById('color-input').value;
            const cosmetic = document.getElementById('cosmetic-input').value;
            myLocalData = { name, color, cosmetic };
            saveProfile(name, color, cosmetic);
        }

        document.getElementById('find-match-btn').addEventListener('click', () => {
            cacheFormInput();
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('browser-screen').style.display = 'flex';
            socket.emit('requestRoomList');
        });

        document.getElementById('create-lobby-btn').addEventListener('click', () => {
            cacheFormInput();
            socket.emit('createRoom', {
                playerName: myLocalData.name,
                roomName: `${myLocalData.name}'s Game`,
                maxPlayers: 10,
                crewmateVis: 6,
                impVis: 16
            });
        });

        document.getElementById('back-auth-btn').addEventListener('click', () => {
            document.getElementById('browser-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        });

        document.getElementById('leave-lobby-btn').addEventListener('click', () => {
            socket.emit('leaveRoom');
            location.reload();
        });

        document.getElementById('start-game-btn').addEventListener('click', () => {
            socket.emit('startMatch');
        });

        document.getElementById('chat-send-btn').addEventListener('click', sendChatMessage);
        document.getElementById('chat-input-field').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendChatMessage();
        });

        function sendChatMessage() {
            const input = document.getElementById('chat-input-field');
            const text = input.value.trim();
            if(!text) return;
            socket.emit('sendChatMessage', { text });
            input.value = '';
        }

        document.getElementById('setting-crew-vis').addEventListener('change', pushSettings);
        document.getElementById('setting-imp-vis').addEventListener('change', pushSettings);

        function pushSettings() {
            if(!isHost) return;
            socket.emit('updateSettings', {
                crewmateVis: parseInt(document.getElementById('setting-crew-vis').value),
                impVis: parseInt(document.getElementById('setting-imp-vis').value)
            });
        }

        socket.on('roomList', (list) => {
            const container = document.getElementById('server-list');
            container.innerHTML = '';
            if(list.length === 0) {
                container.innerHTML = '<p style="color:#aaa; text-align:center; font-size:14px;">No custom matches active.</p>';
                return;
            }
            list.forEach(room => {
                if(room.status === 'lobby') {
                    const row = document.createElement('div');
                    row.style.background = '#333';
                    row.style.padding = '8px';
                    row.style.marginBottom = '6px';
                    row.style.borderRadius = '4px';
                    row.style.display = 'flex';
                    row.style.justifyContent = 'space-between';
                    row.style.alignItems = 'center';
                    
                    row.innerHTML = `
                        <div style="font-size:14px;">
                            <strong>${room.name}</strong> <span style="color:#0578ff;">(${room.players}/${room.maxPlayers})</span>
                        </div>
                        <button style="width:60px; padding:4px; margin:0; font-size:12px;" onclick="joinLobby('${room.id}')">Join</button>
                    `;
                    container.appendChild(row);
                }
            });
        });

        window.joinLobby = function(roomId) {
            socket.emit('joinRoom', {
                roomId,
                playerName: myLocalData.name,
                color: myLocalData.color,
                cosmetic: myLocalData.cosmetic
            });
        };

        socket.on('roomCreated', (roomId) => {
            joinLobby(roomId);
        });

        socket.on('joinSuccess', (data) => {
            myRoomId = data.roomId;
            gameState = 'lobby';
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('browser-screen').style.display = 'none';
            document.getElementById('lobby-ui').style.display = 'block';
            
            init3DEnvironment();
            updateLobbyState(data.players, data.hostId, data.settings);
        });

        socket.on('playerJoined', (p) => {
            appendSystemMessage(`${p.name} connected.`);
        });

        socket.on('playerLeft', (id) => {
            if(players[id]) {
                scene.remove(players[id].mesh);
                delete players[id];
            }
        });

        socket.on('hostChanged', (data) => {
            if(data.hostId === socket.id) {
                isHost = true;
                document.getElementById('start-game-btn').style.display = 'block';
                document.getElementById('setting-crew-vis').removeAttribute('disabled');
                document.getElementById('setting-imp-vis').removeAttribute('disabled');
                appendSystemMessage("You are now host.");
            }
        });

        socket.on('settingsUpdated', (settings) => {
            currentRoomSettings = settings;
            document.getElementById('setting-crew-vis').value = settings.crewmateVis;
            document.getElementById('setting-imp-vis').value = settings.impVis;
        });

        socket.on('chatMessageReceived', (data) => {
            const display = document.getElementById('chat-display');
            const msg = document.createElement('div');
            msg.innerHTML = `<strong>${data.senderName}:</strong> ${data.text}`;
            display.appendChild(msg);
            display.scrollTop = display.scrollHeight;
        });

        socket.on('positionUpdated', (data) => {
            if(players[data.id]) {
                players[data.id].mesh.position.set(data.x, data.y, data.z);
            } else {
                buildRemotePlayer(data.id);
            }
        });

        socket.on('playerProfileUpdated', (p) => {
            if(players[p.id]) {
                players[p.id].mesh.material.color.set(p.color);
                players[p.id].name = p.name;
                players[p.id].cosmetic = p.cosmetic;
            }
        });

        function updateLobbyState(playerArray, hostId, settings) {
            isHost = (hostId === socket.id);
            document.getElementById('start-game-btn').style.display = isHost ? 'block' : 'none';
            
            const crewSelectView = document.getElementById('setting-crew-vis');
            const impSelectView = document.getElementById('setting-imp-vis');
            if(isHost) {
                crewSelectView.removeAttribute('disabled');
                impSelectView.removeAttribute('disabled');
            }
            
            if(settings) {
                crewSelectView.value = settings.crewmateVis;
                impSelectView.value = settings.impVis;
                currentRoomSettings = settings;
            }

            const roster = document.getElementById('player-list-container');
            roster.innerHTML = '';
            playerArray.forEach(p => {
                const row = document.createElement('div');
                row.className = 'player-entry';
                row.innerHTML = `
                    <div class="swatch" style="background:${p.color};"></div>
                    <span>${p.name}</span>
                    ${p.id === hostId ? '<span class="host-label">HOST</span>' : ''}
                `;
                roster.appendChild(row);

                if(p.id !== socket.id && !players[p.id]) {
                    buildRemotePlayer(p);
                }
            });
        }

        function appendSystemMessage(txt) {
            const display = document.getElementById('chat-display');
            const msg = document.createElement('div');
            msg.style.color = '#ffca28';
            msg.innerText = txt;
            display.appendChild(msg);
            display.scrollTop = display.scrollHeight;
        }

        function init3DEnvironment() {
            const container = document.getElementById('canvas-container');
            if(renderer) return; 

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#111');

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            spotlight = new THREE.SpotLight(0xffffff, 1.5, 100, Math.PI/3, 0.5, 1);
            spotlight.position.set(0, 15, 0);
            scene.add(spotlight);

            const floorGeo = new THREE.PlaneGeometry(60, 60);
            const floorMat = new THREE.MeshStandardMaterial({ color: #222, roughness: 0.6 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const grid = new THREE.GridHelper(60, 30, #333, #222);
            grid.position.y = 0.01;
            scene.add(grid);

            vents.forEach(v => {
                const ventGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.1, 16);
                const ventMat = new THREE.MeshStandardMaterial({ color: #444, metalness: 0.8 });
                const ventMesh = new THREE.Mesh(ventGeo, ventMat);
                ventMesh.position.set(v.x, v.y, v.z);
                scene.add(ventMesh);
                v.mesh = ventMesh;
            });

            const pGeo = new THREE.CylinderGeometry(0.8, 0.8, 2, 16);
            const pMat = new THREE.MeshStandardMaterial({ color: myLocalData.color });
            localPlayerMesh = new THREE.Mesh(pGeo, pMat);
            localPlayerMesh.position.set((Math.random() - 0.5) * 10, 1, (Math.random() - 0.5) * 10);
            scene.add(localPlayerMesh);

            camera.position.set(0, 18, 12);
            camera.lookAt(localPlayerMesh.position);

            window.addEventListener('resize', onWindowResize);
            setupInputProfiles();
            animateLoop();
        }

        function buildRemotePlayer(p) {
            const pGeo = new THREE.CylinderGeometry(0.8, 0.8, 2, 16);
            const pMat = new THREE.MeshStandardMaterial({ color: p.color || '#ffffff' });
            const mesh = new THREE.Mesh(pGeo, pMat);
            mesh.position.set(p.x || 0, 1, p.z || 0);
            scene.add(mesh);
            players[p.id] = { mesh, name: p.name, cosmetic: p.cosmetic };
        }

        function setupInputProfiles() {
            window.addEventListener('keydown', (e) => {
                if(document.activeElement.tagName === 'INPUT') return;
                if(e.key === 'w' || e.key === 'ArrowUp') keys.w = true;
                if(e.key === 'a' || e.key === 'ArrowLeft') keys.a = true;
                if(e.key === 's' || e.key === 'ArrowDown') keys.s = true;
                if(e.key === 'd' || e.key === 'ArrowRight') keys.d = true;
            });
            window.addEventListener('keyup', (e) => {
                if(e.key === 'w' || e.key === 'ArrowUp') keys.w = false;
                if(e.key === 'a' || e.key === 'ArrowLeft') keys.a = false;
                if(e.key === 's' || e.key === 'ArrowDown') keys.s = false;
                if(e.key === 'd' || e.key === 'ArrowRight') keys.d = false;
            });

            const joystickContainer = document.getElementById('joystick-container');
            const joystickKnob = document.getElementById('joystick-knob');
            
            if('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                joystickContainer.style.display = 'block';
            }

            joystickContainer.addEventListener('touchstart', (e) => {
                joystickActive = true;
                const t = e.touches[0];
                joystickStartX = t.clientX;
                joystickStartY = t.clientY;
            });

            window.addEventListener('touchmove', (e) => {
                if(!joystickActive) return;
                const t = e.touches[0];
                let dx = t.clientX - joystickStartX;
                let dy = t.clientY - joystickStartY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 35);
                
                const angle = Math.atan2(dy, dx);
                moveX = Math.cos(angle) * (dist / 35);
                moveY = Math.sin(angle) * (dist / 35);

                joystickKnob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            });

            window.addEventListener('touchend', () => {
                joystickActive = false;
                moveX = 0; moveY = 0;
                joystickKnob.style.transform = 'translate(0px, 0px)';
            });

            document.getElementById('use-btn').addEventListener('click', processUseInteractAction);
            document.getElementById('vent-btn').addEventListener('click', toggleVentStateMode);
            document.getElementById('sabotage-menu-btn').addEventListener('click', () => {
                if(myRole === 'imposter' && isAlive) socket.emit('triggerSabotage', { type: 'lights' });
            });
        }

        let clockTimeLast = performance.now();
        function animateLoop() {
            requestAnimationFrame(animateLoop);
            if(gameState !== 'playing' && gameState !== 'lobby') return;

            const now = performance.now();
            let frameDelta = (now - clockTimeLast) / 1000;
            clockTimeLast = now;
            if(frameDelta > 0.1) frameDelta = 0.1;

            if(isAlive && !isVenting) {
                let xSpeed = 0;
                let zSpeed = 0;
                const movementVelocityScalar = 7.5;

                if(joystickActive) {
                    xSpeed = moveX * movementVelocityScalar * frameDelta;
                    zSpeed = moveY * movementVelocityScalar * frameDelta;
                } else {
                    if(keys.w) zSpeed = -movementVelocityScalar * frameDelta;
                    if(keys.s) zSpeed = movementVelocityScalar * frameDelta;
                    if(keys.a) xSpeed = -movementVelocityScalar * frameDelta;
                    if(keys.d) xSpeed = movementVelocityScalar * frameDelta;
                }

                localPlayerMesh.position.x += xSpeed;
                localPlayerMesh.position.z += zSpeed;

                localPlayerMesh.position.x = Math.max(-29, Math.min(29, localPlayerMesh.position.x));
                localPlayerMesh.position.z = Math.max(-29, Math.min(29, localPlayerMesh.position.z));

                if(now - lastPositionEmit > 45 && (xSpeed !== 0 || zSpeed !== 0)) {
                    socket.emit('syncPosition', { x: localPlayerMesh.position.x, y: localPlayerMesh.position.y, z: localPlayerMesh.position.z });
                    lastPositionEmit = now;
                }
            }

            camera.position.x = localPlayerMesh.position.x;
            camera.position.z = localPlayerMesh.position.z + 14;
            camera.lookAt(localPlayerMesh.position);

            spotlight.position.set(localPlayerMesh.position.x, 15, localPlayerMesh.position.z);
            spotlight.target = localPlayerMesh;

            evaluateProximitySensors();
            renderer.render(scene, camera);
        }

        function evaluateProximitySensors() {
            if(gameState !== 'playing') return;
            
            let closeToVent = null;
            vents.forEach(v => {
                const d = localPlayerMesh.position.distanceTo(v.mesh.position);
                if(d < 2.5) closeToVent = v;
            });

            const ventButton = document.getElementById('vent-btn');
            if(myRole === 'imposter' && isAlive && closeToVent) {
                ventButton.style.display = 'flex';
                currentVent = closeToVent;
            } else if(!isVenting) {
                ventButton.style.display = 'none';
                currentVent = null;
            }

            const useButton = document.getElementById('use-btn');
            if(lightsSabotaged && isAlive && !isVenting) {
                let nearBreaker = localPlayerMesh.position.distanceTo(new THREE.Vector3(0,0,0)) < 4;
                useButton.style.display = nearBreaker ? 'flex' : 'none';
            } else {
                useButton.style.display = 'none';
            }
        }

        function toggleVentStateMode() {
            if(!currentVent) return;
            if(!isVenting) {
                isVenting = true;
                localPlayerMesh.visible = false;
                localPlayerMesh.position.set(currentVent.x, -2, currentVent.z);
                document.getElementById('vent-btn').innerText = 'Exit';
            } else {
                isVenting = false;
                localPlayerMesh.visible = true;
                localPlayerMesh.position.y = 1;
                document.getElementById('vent-btn').innerText = 'Vent';
                socket.emit('syncPosition', { x: localPlayerMesh.position.x, y: localPlayerMesh.position.y, z: localPlayerMesh.position.z });
            }
        }

        function processUseInteractAction() {
            if(lightsSabotaged) {
                document.getElementById('lights-minigame').style.display = 'flex';
            }
        }

        window.closeMinigame = function() {
            document.getElementById('lights-minigame').style.display = 'none';
        };

        const switches = [
            document.getElementById('switch-0'),
            document.getElementById('switch-1'),
            document.getElementById('switch-2')
        ];
        switches.forEach((sw, idx) => {
            sw.addEventListener('click', () => {
                const currentState = sw.classList.contains('active');
                socket.emit('fixLightBulb', { index: idx, state: !currentState });
            });
        });

        socket.on('sabotageTriggered', (data) => {
            if(data.type === 'lights') {
                lightsSabotaged = true;
                document.getElementById('sabotage-indicator').style.display = 'block';
                updateVisibilityLighting();
            }
        });

        socket.on('lightsStateUpdated', (data) => {
            data.bulbs.forEach((state, idx) => {
                const bulb = document.getElementById(`bulb-${idx}`);
                const sw = document.getElementById(`switch-${idx}`);
                if(state) {
                    bulb.classList.add('on');
                    sw.classList.add('active');
                    sw.innerText = 'ON';
                } else {
                    bulb.classList.remove('on');
                    sw.classList.remove('active');
                    sw.innerText = 'OFF';
                }
            });
        });

        socket.on('sabotageFixed', (data) => {
            if(data.type === 'lights') {
                lightsSabotaged = false;
                document.getElementById('sabotage-indicator').style.display = 'none';
                document.getElementById('lights-minigame').style.display = 'none';
                updateVisibilityLighting();
            }
        });

        function updateVisibilityLighting() {
            if(lightsSabotaged) {
                if(myRole === 'imposter') {
                    ambientLight.intensity = 0.8;
                    spotlight.distance = currentRoomSettings.impVis;
                } else {
                    ambientLight.intensity = 0.05;
                    spotlight.distance = currentRoomSettings.crewmateVis;
                }
            } else {
                ambientLight.intensity = 0.8;
                spotlight.distance = 100;
            }
        }

        socket.on('matchStarted', (playerData) => {
            gameState = 'playing';
            document.getElementById('lobby-ui').style.display = 'none';
            
            const self = playerData.find(p => p.id === socket.id);
            myRole = self.role;
            isAlive = self.isAlive;

            const reveal = document.getElementById('role-reveal');
            const title = document.getElementById('role-text');

            title.innerText = myRole;
            title.className = myRole;
            
            reveal.style.display = 'flex';
            setTimeout(() => { reveal.style.display = 'none'; }, 3000);

            if(myRole === 'imposter') {
                document.getElementById('sabotage-menu-btn').style.display = 'flex';
            }
            updateVisibilityLighting();
        });

        socket.on('matchEnded', (data) => {
            gameState = 'lobby';
            document.getElementById('lobby-ui').style.display = 'block';
            document.getElementById('sabotage-menu-btn').style.display = 'none';
            document.getElementById('use-btn').style.display = 'none';
            document.getElementById('vent-btn').style.display = 'none';
            document.getElementById('sabotage-indicator').style.display = 'none';
            
            lightsSabotaged = false;
            isVenting = false;
            localPlayerMesh.visible = true;
            localPlayerMesh.position.y = 1;
            
            alert(`Game Over! Winners: ${data.winner.toUpperCase()}`);
            updateLobbyState(data.players, data.hostId);
        });

        function onWindowResize() {
            if(!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
